function renderMiniCal(y,m,mname){
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0).getDate();
  const startDay=first.getDay();
  let html=`<div class="card" style="margin-bottom:0.875rem;padding:0.875rem">
    <div style="font-size:12px;font-weight:600;color:var(--navy);margin-bottom:0.5rem">${mname} ${y}</div>
    <div class="cal-grid">
    ${['S','M','T','W','T','F','S'].map(d=>`<div style="font-size:10px;color:var(--muted);text-align:center;padding:2px 0;font-weight:600">${d}</div>`).join('')}
    ${'<div></div>'.repeat(startDay)}`;
  for(let d=1;d<=last;d++){
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(y,m,d).getDay();
    const isHol=TN_HOLIDAYS_2026[dateStr];
    const isToday=dateStr===TODAY.toISOString().slice(0,10);
    const isSun=dow===0;
    const cls=isToday?'today':isHol?'holiday':isSun?'weekend':'';
    html+=`<div class="cal-day ${cls}" title="${isHol||''}">
      <span style="font-size:11px">${d}</span>
      ${isHol?'<div class="cal-dot"></div>':''}
    </div>`;
  }
  html+='</div></div>';
  return html;
}

function renderProdRows(workers){
  return workers.map(w=>{
    const p=S.production[w.id]||{daysWorked:0,totalUnits:0,rejects:0};
    const net=p.totalUnits-p.rejects;
    const avg=p.daysWorked?Math.round(net/p.daysWorked):0;
    const target=S.targets[w.skill]||300;
    const eff=Math.min(100,Math.round(avg/target*100));
    const c=eff>=85?'bg':eff>=65?'by':'br';
    return `<tr>
      <td style="font-weight:500">${w.name}</td>
      <td><span class="badge bb">${w.skill}</span></td>
      <td>${p.daysWorked}</td>
      <td>${p.totalUnits}</td>
      <td style="color:#c62828">${p.rejects}</td>
      <td style="font-weight:600">${net}</td>
      <td>${avg}</td>
      <td><span class="badge ${c}">${eff}%</span></td>
    </tr>`;
  }).join('');
}

function filterProdTable(){
  const skill=document.getElementById('prod-filter-skill').value;
  const tbody=document.getElementById('prod-tbody');
  if(!tbody) return;
  tbody.innerHTML=renderProdRows(skill?S.contractWorkers.filter(w=>w.skill===skill):S.contractWorkers);
}

function saveProdEntry(){
  SKILLS.forEach(skill=>{
    const key=skill.replace(/ /g,'-');
    const units=parseInt(document.getElementById(`prod-${key}`)?.value)||0;
    const rejects=parseInt(document.getElementById(`rej-${key}`)?.value)||0;
    if(units>0){
      S.contractWorkers.filter(w=>w.skill===skill).forEach(w=>{
        if(!S.production[w.id]) S.production[w.id]={daysWorked:0,totalUnits:0,rejects:0};
        S.production[w.id].totalUnits+=Math.round(units/S.contractWorkers.filter(x=>x.skill===skill).length);
        S.production[w.id].rejects+=Math.round(rejects/S.contractWorkers.filter(x=>x.skill===skill).length);
        S.production[w.id].daysWorked+=1;
      });
    }
  });
  alert('Production data saved for today!');
  nav('production');
}

    <tbody>
    ${empP.map(e=>`<tr>

      <td>₹${e.basic.toLocaleString()}</td>

  <div class="divider"></div>
  <div class="st" style="margin-bottom:0.75rem">Leave Balance</div>
  <div class="fg2">
    ${Object.entries(LEAVE_TYPES).map(([k,v])=>`<div style="background:${v.bg};border-radius:6px;padding:0.625rem;text-align:center">
      <div style="font-size:1.2rem;font-weight:700;color:${v.color}">${l[k]||0}</div>
      <div style="font-size:10px;color:${v.color};font-weight:600">${v.label}</div>
      <div style="font-size:10px;color:${v.color}">of ${v.max===999?'∞':v.max}</div>
    </div>`).join('')}
  </div>
`)}
function addEmpModal(){showModal(`
  <div class="mh"><div class="mt">Add New Employee</div><button class="mc" onclick="closeModal()"><i class="fa fa-times"></i></button></div>
  <div class="fg2">
    <div><label class="fl">Full Name</label><input id="en" placeholder="Name"></div>
    <div><label class="fl">Department</label><select id="ed2">${DEPTS.map(d=>`<option>${d}</option>`).join('')}</select></div>
    <div><label class="fl">Role</label><input id="er" placeholder="Designation"></div>
    <div><label class="fl">Salary (₹/mo)</label><input type="number" id="esal"></div>
    <div><label class="fl">Gender</label><select id="eg"><option value="M">Male</option><option value="F">Female</option></select></div>
    <div><label class="fl">Phone</label><input type="tel" id="eph"></div>
    <div><label class="fl">Date of Joining</label><input type="date" id="ej" value="${TODAY.toISOString().slice(0,10)}"></div>
  </div>
  <div style="margin-top:1rem;display:flex;gap:0.75rem;justify-content:flex-end">
    <button class="btn bto" onclick="closeModal()">Cancel</button>
    <button class="btn btp" onclick="saveEmp()"><i class="fa fa-save"></i> Save</button>
  </div>
`)}
function saveEmp(){const n=document.getElementById('en').value.trim();const r=document.getElementById('er').value.trim();const sal=parseInt(document.getElementById('esal').value)||0;const ph=document.getElementById('eph').value.trim();if(!n||!r||!sal||!ph){alert('Fill all fields');return}const id='E'+String(S.employees.length+1).padStart(3,'0');S.employees.push({id,name:n,dept:document.getElementById('ed2').value,role:r,salary:sal,phone:ph,joined:document.getElementById('ej').value,status:'active',gender:document.getElementById('eg').value});S.leaves[id]={CL:0,SL:0,PL:0,ML:0,LWP:0};closeModal();nav('employees')}

function rContract(){
  return `
<div class="sh" style="margin-bottom:1rem">
  <div style="display:flex;gap:0.75rem">
    <input type="text" placeholder="Search..." id="cs" style="width:200px" oninput="filterCon()">
    <select id="csk" onchange="filterCon()"><option value="">All Skills</option>${SKILLS.map(s=>`<option>${s}</option>`).join('')}</select>
  </div>
  <button class="btn btp bts" onclick="addConModal()"><i class="fa fa-plus"></i> Add Worker</button>
</div>
<div class="tw">
<table>
  <thead><tr><th>ID</th><th>Name</th><th>Skill</th><th>Rate/Unit</th><th>Units (${TM.slice(5)})</th><th>Earned</th><th>Min Wage</th><th>Efficiency</th><th></th></tr></thead>
  <tbody id="ctb">${conRows(S.contractWorkers)}</tbody>
</table>
</div>`;
}
function conRows(ws){return ws.map(w=>{const qty=S.pieceEntries[`${w.id}-${TM}`]||0;const earn=Math.round(qty*(S.pieceRates[w.skill]||0));const p=S.production[w.id]||{};const eff=p.daysWorked?Math.min(100,Math.round((p.totalUnits/p.daysWorked)/(S.targets[w.skill]||300)*100)):0;return `<tr><td><span class="pill">${w.id}</span></td><td style="font-weight:500">${w.name}</td><td><span class="badge bb">${w.skill}</span></td><td>₹${S.pieceRates[w.skill]||0}</td><td style="font-weight:600">${qty}</td><td style="font-weight:700;color:${earn>0?'var(--teal)':'var(--muted)'}">₹${earn.toLocaleString()}</td><td><span class="badge ${earn>=TN_MIN_WAGE?'bg':'br'}">${earn>=TN_MIN_WAGE?'OK':'Low'}</span></td><td><span class="badge ${eff>=85?'bg':eff>=65?'by':'br'}">${eff}%</span></td><td><button class="btn bto bts" onclick="entPiece('${w.id}')"><i class="fa fa-plus"></i></button></td></tr>`}).join('')}
function filterCon(){const q=document.getElementById('cs').value.toLowerCase();const sk=document.getElementById('csk').value;const t=document.getElementById('ctb');if(t)t.innerHTML=conRows(S.contractWorkers.filter(w=>(!q||w.name.toLowerCase().includes(q))&&(!sk||w.skill===sk)))}
function addConModal(){showModal(`<div class="mh"><div class="mt">Add Contract Worker</div><button class="mc" onclick="closeModal()"><i class="fa fa-times"></i></button></div><div class="fg2"><div><label class="fl">Name</label><input id="cwn" placeholder="Worker name"></div><div><label class="fl">Skill</label><select id="cws">${SKILLS.map(s=>`<option>${s}</option>`).join('')}</select></div><div><label class="fl">Phone</label><input type="tel" id="cwp"></div><div><label class="fl">Aadhar (opt.)</label><input id="cwa" placeholder="12-digit"></div></div><div style="margin-top:1rem;display:flex;gap:0.75rem;justify-content:flex-end"><button class="btn bto" onclick="closeModal()">Cancel</button><button class="btn btp" onclick="saveCon()"><i class="fa fa-save"></i> Save</button></div>`)}
function saveCon(){const n=document.getElementById('cwn').value.trim();const p=document.getElementById('cwp').value.trim();if(!n||!p){alert('Fill required fields');return}const id='C'+String(S.contractWorkers.length+1).padStart(3,'0');S.contractWorkers.push({id,name:n,skill:document.getElementById('cws').value,phone:p,status:'active'});S.production[id]={daysWorked:0,totalUnits:0,rejects:0};closeModal();nav('contract')}
function entPiece(wid){const w=S.contractWorkers.find(x=>x.id===wid);if(!w) return;showModal(`<div class="mh"><div class="mt">Piece Entry — ${w.name}</div><button class="mc" onclick="closeModal()"><i class="fa fa-times"></i></button></div><div style="background:var(--cream);border-radius:8px;padding:1rem;margin-bottom:1rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;text-align:center;font-size:13px"><div><div style="color:var(--muted);font-size:10px;text-transform:uppercase">Skill</div><div style="font-weight:600">${w.skill}</div></div><div><div style="color:var(--muted);font-size:10px;text-transform:uppercase">Rate</div><div style="font-weight:600">₹${S.pieceRates[w.skill]||0}</div></div><div><div style="color:var(--muted);font-size:10px;text-transform:uppercase">Month Total</div><div style="font-weight:700;color:var(--teal)">${S.pieceEntries[`${w.id}-${TM}`]||0}</div></div></div><div class="fg2"><div class="fgf"><label class="fl">Units Today</label><input type="number" id="pq" placeholder="Qty" min="0"></div><div class="fgf"><label class="fl">Rejects Today</label><input type="number" id="pr" placeholder="0" min="0"></div></div><div style="margin-top:1rem;display:flex;gap:0.75rem;justify-content:flex-end"><button class="btn bto" onclick="closeModal()">Cancel</button><button class="btn btp" onclick="savePiece('${w.id}')"><i class="fa fa-check"></i> Add</button></div>`)}
function savePiece(wid){const qty=parseInt(document.getElementById('pq').value)||0;const rej=parseInt(document.getElementById('pr').value)||0;if(qty<=0){alert('Enter valid quantity');return}S.pieceEntries[`${wid}-${TM}`]=(S.pieceEntries[`${wid}-${TM}`]||0)+qty;if(!S.production[wid])S.production[wid]={daysWorked:1,totalUnits:0,rejects:0};S.production[wid].totalUnits+=qty;S.production[wid].rejects+=rej;closeModal();nav(S.page==='piecerate'?'piecerate':'contract')}

function rReports(){
  const skillTotal={};
  S.contractWorkers.forEach(w=>{const earn=Math.round((S.pieceEntries[`${w.id}-${TM}`]||0)*(S.pieceRates[w.skill]||0));skillTotal[w.skill]=(skillTotal[w.skill]||0)+earn});
  const deptSal={};S.employees.forEach(e=>{deptSal[e.dept]=(deptSal[e.dept]||0)+e.salary});
  const maxS=Math.max(...Object.values(skillTotal));const maxD=Math.max(...Object.values(deptSal));
  const cls=['#1a2340','#00897b','#f9a825','#c62828','#7b1fa2','#1565c0','#2e7d32'];
  const leaveTotal={CL:0,SL:0,PL:0,ML:0,LWP:0};
  S.employees.forEach(e=>{const l=S.leaves[e.id]||{};Object.keys(leaveTotal).forEach(k=>{leaveTotal[k]+=(l[k]||0)})});
  return `
<div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem">
  <div class="card">
    <div class="sh"><div class="st">Piece Pay by Skill — ${TODAY.toLocaleString('en-IN',{month:'short'})}</div></div>
    ${Object.entries(skillTotal).sort((a,b)=>b[1]-a[1]).map(([s,a],i)=>`
      <div style="margin-bottom:0.75rem">
        <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px"><span style="font-weight:500">${s}</span><span style="font-weight:700;color:var(--teal)">₹${a.toLocaleString()}</span></div>
        <div class="pb"><div style="height:100%;border-radius:3px;background:${cls[i%cls.length]};width:${Math.round(a/maxS*100)}%"></div></div>
      </div>`).join('')}
  </div>
  <div class="card">
    <div class="sh"><div class="st">Salary by Department</div></div>
    ${Object.entries(deptSal).sort((a,b)=>b[1]-a[1]).map(([d,a],i)=>`
      <div style="margin-bottom:0.75rem">
        <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px"><span style="font-weight:500">${d}</span><span style="font-weight:700;color:var(--navy)">₹${a.toLocaleString()}</span></div>
        <div class="pb"><div style="height:100%;border-radius:3px;background:${cls[i%cls.length]};width:${Math.round(a/maxD*100)}%"></div></div>
      </div>`).join('')}
  </div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem">
  <div class="card">
    <div class="sh"><div class="st">Leave Summary</div></div>
    ${Object.entries(leaveTotal).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--muted)">${LEAVE_TYPES[k].label}</span><strong>${v} days</strong></div>`).join('')}
  </div>
  <div class="card">
    <div class="sh"><div class="st">Efficiency Leaders</div></div>
    ${S.contractWorkers.map(w=>{const p=S.production[w.id]||{};const avg=p.daysWorked?Math.round(p.totalUnits/p.daysWorked):0;return {...w,avg,eff:Math.min(100,Math.round(avg/(S.targets[w.skill]||300)*100))}}).sort((a,b)=>b.eff-a.eff).slice(0,6).map((w,i)=>`
      <div style="display:flex;align-items:center;gap:8px;padding:0.375rem 0;border-bottom:1px solid var(--border);font-size:12.5px">
        <div style="width:20px;height:20px;border-radius:50%;background:var(--navy);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center">${i+1}</div>
        <div style="flex:1;font-weight:500">${w.name}</div>
        <span class="badge ${w.eff>=85?'bg':w.eff>=65?'by':'br'}">${w.eff}%</span>
      </div>`).join('')}
  </div>
  <div class="card">
    <div class="sh"><div class="st">Workforce Overview</div></div>
    <div style="font-size:13px;display:flex;flex-direction:column;gap:0.4rem">
      <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Total Headcount</span><strong>80</strong></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Female Staff</span><strong>${S.employees.filter(e=>e.gender==='F').length}</strong></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Male Staff</span><strong>${S.employees.filter(e=>e.gender==='M').length}</strong></div>
      <div class="divider" style="margin:0.5rem 0"></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Avg Staff Salary</span><strong>₹${Math.round(S.employees.reduce((s,e)=>s+e.salary,0)/20).toLocaleString()}</strong></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">ESI Eligible</span><strong>${S.employees.filter(e=>e.salary<=21000).length} staff</strong></div>
      <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Hols This Month</span><strong>${Object.keys(TN_HOLIDAYS_2026).filter(d=>d.startsWith(TM)).length} days</strong></div>
    </div>
  </div>
</div>`;
}

function showModal(html){document.getElementById('mbody').innerHTML=html;document.getElementById('moverlay').classList.remove('hidden')}
function closeModal(){document.getElementById('moverlay').classList.add('hidden');document.getElementById('mbody').innerHTML=''}
document.getElementById('moverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});

nav('dashboard');
</script>
